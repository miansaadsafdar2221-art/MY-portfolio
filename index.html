<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saad Safdar | Portfolio</title>

<style>
:root {
    --bg: #0f172a;
    --primary: #38bdf8;
    --text: #e2e8f0;
    --card: #1e293b;
}

/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* Container */
.container {
    width: 90%;
    max-width: 1100px;
    margin: auto;
}

/* Navbar */
.navbar {
    background: #020617;
    padding: 15px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    color: var(--primary);
}

/* Nav Links */
.nav-links {
    list-style: none;
    display: flex;
    gap: 25px;
}

.nav-links a {
    text-decoration: none;
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    position: relative;
    transition: 0.25s ease;
}

/* 🔥 Hover Upgrade */
.nav-links a:hover {
    color: var(--primary);
    background: rgba(56,189,248,0.1);
}

/* Underline effect */
.nav-links a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 0%;
    height: 2px;
    background: var(--primary);
    transition: 0.3s;
}

.nav-links a:hover::after {
    width: 100%;
}

/* Mobile menu button */
.menu-btn {
    display: none;
    font-size: 24px;
    cursor: pointer;
}

/* Hero */
.hero {
    padding: 100px 0;
    text-align: center;
}

.hero h1 {
    font-size: 2.7rem;
}

.hero p {
    margin-top: 10px;
    color: #94a3b8;
}

/* Sections */
.section {
    padding: 70px 0;
    text-align: center;
}

.alt {
    background: #020617;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
    margin-top: 30px;
}

/* Cards */
.card {
    background: var(--card);
    padding: 30px;
    border-radius: 10px;
    transition: 0.25s;
    border: 1px solid transparent;
}

/* 🔥 Card Hover */
.card:hover {
    border: 1px solid rgba(56,189,248,0.3);
    transform: translateY(-5px);
}

/* Contact */
#contact p {
    margin-top: 10px;
    color: #94a3b8;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
    color: #94a3b8;
}

/* Responsive */
@media(max-width: 768px) {

    .grid {
        grid-template-columns: 1fr;
    }

    .nav-links {
        position: absolute;
        top: 60px;
        right: 0;
        background: #020617;
        width: 220px;
        flex-direction: column;
        display: none;
        padding: 20px;
        border-left: 1px solid rgba(255,255,255,0.05);
    }

    .nav-links.active {
        display: flex;
    }

    .menu-btn {
        display: block;
    }
}
</style>

</head>

<body>

<!-- Navbar -->
<header class="navbar">
    <div class="container nav-container">
        <h2 class="logo">Saad</h2>

        <ul class="nav-links" id="navLinks">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

        <div class="menu-btn" onclick="toggleMenu()">☰</div>
    </div>
</header>

<!-- Hero -->
<section id="home" class="hero">
    <div class="container">
        <h1>Hi, I'm Saad Safdar</h1>
        <p>Frontend Developer | HTML | CSS | JavaScript</p>
    </div>
</section>

<!-- About -->
<section id="about" class="section">
    <div class="container">
        <h2>About Me</h2>
        <p>
            I build clean and responsive websites using modern web technologies.
        </p>
    </div>
</section>

<!-- Projects -->
<section id="projects" class="section alt">
    <div class="container">
        <h2>Projects</h2>

        <div class="grid">
            <div class="card">Project 1</div>
            <div class="card">Project 2</div>
            <div class="card">Project 3</div>
        </div>

    </div>
</section>

<!-- Contact -->
<section id="contact" class="section">
    <div class="container">
        <h2>Contact</h2>
        <p>Email: saad@email.com</p>
    </div>
</section>

<footer>
    <p>© 2026 Saad Safdar</p>
</footer>

<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
