<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saad Safdar | Portfolio</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body>

<div class="cursor"></div>
<div class="cursor-blur"></div>

<header class="navbar">
    <div class="container nav">
        <h2 class="logo">Saad.</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </div>
</header>

<section class="hero">
    <div class="container hero-grid">

        <div class="left">
            <p class="badge">Frontend Developer</p>

            <h1 class="title">
                Crafting <br>
                <span>Next-Level Digital Experiences</span>
            </h1>

            <p class="sub">
                Clean UI • Smooth animations • Premium feel
            </p>

            <div class="buttons">
                <a href="#projects" class="btn magnetic">View Work</a>
                <a href="#contact" class="btn-outline magnetic">Hire Me</a>
            </div>
        </div>

        <div class="right">
            <div class="glow"></div>
            <img src="https://picsum.photos/300">
        </div>

    </div>
</section>

<section id="projects" class="section">
    <div class="container">
        <h2 class="section-title">Projects</h2>

        <div class="grid">
            <div class="card magnetic">
                <img src="https://picsum.photos/500/400?1">
                <div class="overlay"><h3>Portfolio</h3></div>
            </div>

            <div class="card magnetic">
                <img src="https://picsum.photos/500/400?2">
                <div class="overlay"><h3>Dashboard</h3></div>
            </div>

            <div class="card magnetic">
                <img src="https://picsum.photos/500/400?3">
                <div class="overlay"><h3>Web App</h3></div>
            </div>
        </div>
    </div>
</section>

<section id="contact" class="section">
    <div class="container">
        <h2 class="section-title">Contact</h2>
        <p>Email: saad@email.com</p>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
