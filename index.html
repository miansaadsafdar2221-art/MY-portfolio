<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saad Safdar | Portfolio</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

</head>

<body>

<!-- LOADER -->
<div class="loader">
    <h1>Saad Safdar</h1>
</div>

<!-- CURSOR -->
<div class="cursor"></div>
<div class="cursor-blur"></div>

<header class="navbar">
    <div class="nav">
        <h2>Saad.</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </div>
</header>

<section class="hero">
    <div class="left">
        <p class="badge">Frontend Developer</p>

        <h1>
            Crafting <br>
            <span>Elite Web Experiences</span>
        </h1>

        <p class="sub">Smooth, interactive & premium UI.</p>

        <div class="buttons">
            <a href="#projects" class="btn magnetic">View Work</a>
            <a href="#contact" class="btn-outline magnetic">Hire Me</a>
        </div>
    </div>

    <div class="right">
        <div class="glow"></div>
        <img src="https://picsum.photos/300">
    </div>
</section>

<section id="projects" class="section">
    <h2>Projects</h2>

    <div class="grid">
        <div class="card magnetic">
            <img src="https://picsum.photos/500/400?1">
            <div class="overlay"><h3>Portfolio</h3></div>
        </div>

        <div class="card magnetic">
            <img src="https://picsum.photos/500/400?2">
            <div class="overlay"><h3>Dashboard</h3></div>
        </div>

        <div class="card magnetic">
            <img src="https://picsum.photos/500/400?3">
            <div class="overlay"><h3>App</h3></div>
        </div>
    </div>
</section>

<section id="contact" class="section">
    <h2>Contact</h2>
    <p>Email: saad@email.com</p>
</section>

<script src="script.js"></script>
</body>
</html>
